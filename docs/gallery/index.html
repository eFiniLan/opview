<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>opview UI Gallery</title>
<style>
  :root { --bg: #0a0a0a; --fg: #e0e0e0; --muted: #666; --accent: #167f40; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif; padding: 2rem; }
  h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }

  /* scenario switcher */
  .switcher { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
  .switcher button {
    background: #1a1a1a; border: 1px solid #333; color: var(--fg);
    padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .switcher button:hover { background: #222; border-color: #555; }
  .switcher button.active { background: var(--accent); border-color: var(--accent); }

  /* grid — one card per device */
  .grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }

  /* card */
  .card { text-align: center; }
  .card-label { margin-top: 0.6rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-res { font-size: 0.7rem; color: #444; }

  /* phone — landscape, rounded corners, side buttons */
  .mock-phone {
    position: relative; display: inline-block;
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border-radius: 24px; padding: 12px 16px;
    border: 2px solid #333;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .mock-phone::before {
    content: ''; position: absolute;
    left: -2px; top: 50%; transform: translateY(-50%);
    width: 6px; height: 40px; background: #1a1a1a;
    border-radius: 0 4px 4px 0; border: 2px solid #333; border-left: none;
  }
  .mock-phone::after {
    content: ''; position: absolute;
    right: -5px; top: 30%; width: 3px; height: 24px;
    background: #333; border-radius: 2px;
    box-shadow: 0 36px 0 #333;
  }

  /* tablet — landscape, thin bezels, front camera */
  .mock-tablet {
    position: relative; display: inline-block;
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border-radius: 18px; padding: 14px 18px;
    border: 2px solid #333;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .mock-tablet::before {
    content: ''; position: absolute;
    top: 4px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 8px; background: #222;
    border-radius: 50%; border: 1px solid #444;
  }

  /* headunit — wide, industrial, flat */
  .mock-headunit {
    position: relative; display: inline-block;
    background: linear-gradient(180deg, #222, #181818);
    border-radius: 8px; padding: 10px 12px 14px;
    border: 2px solid #2a2a2a;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .mock-headunit::after {
    content: ''; position: absolute;
    bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 2px; background: #333; border-radius: 1px;
  }

  /* full HD — monitor with stand */
  .mock-full_hd {
    position: relative; display: inline-block;
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border-radius: 10px; padding: 10px 10px 28px;
    border: 2px solid #333;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    margin-bottom: 16px;
  }
  .mock-full_hd::after {
    content: ''; position: absolute;
    bottom: -16px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 16px;
    background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
    border-radius: 0 0 6px 6px; border: 2px solid #333; border-top: none;
  }

  /* shared screen style */
  .screen { overflow: hidden; background: #000; }
  .mock-phone .screen { border-radius: 12px; }
  .mock-tablet .screen { border-radius: 8px; }
  .mock-headunit .screen { border-radius: 4px; }
  .mock-full_hd .screen { border-radius: 4px; }
  .screen img { display: block; width: 100%; height: auto; }
  .mock-phone, .mock-tablet, .mock-headunit, .mock-full_hd { max-width: 100%; }
</style>
</head>
<body>

<h1>opview UI Gallery</h1>
<p class="subtitle">Auto-generated screenshots from golden tests</p>

<div class="switcher" id="switcher"></div>
<div class="grid" id="grid"></div>

<script>
const devices = [
  { id: 'phone', name: 'Phone', res: '844 x 390', mock: 'mock-phone' },
  { id: 'tablet', name: 'Tablet', res: '1024 x 768', mock: 'mock-tablet' },
  { id: 'headunit', name: 'Headunit', res: '1280 x 480', mock: 'mock-headunit' },
  { id: 'full_hd', name: 'Full HD', res: '1920 x 1080', mock: 'mock-full_hd' },
];
const scenarios = [
  { id: 'disengaged', label: 'Disengaged' },
  { id: 'engaged', label: 'Engaged' },
  { id: 'alert_calibrating', label: 'Calibrating' },
  { id: 'alert_small', label: 'Alert Small' },
  { id: 'alert_prompt', label: 'Alert Prompt' },
  { id: 'alert_soft_disable', label: 'Soft Disable' },
  { id: 'alert_critical', label: 'Alert Critical' },
];

const isPages = location.hostname.includes('github.io') || location.pathname.includes('_site');
const imgBase = isPages ? 'goldens' : '../../test/golden/goldens';

// build scenario switcher
const switcher = document.getElementById('switcher');
scenarios.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.label;
  btn.dataset.scenario = s.id;
  if (i === 0) btn.classList.add('active');
  switcher.appendChild(btn);
});

// build device cards
const grid = document.getElementById('grid');
for (const device of devices) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="${device.mock}">
      <div class="screen">
        <img id="img-${device.id}"
             src="${imgBase}/${device.id}_${scenarios[0].id}.png"
             alt="${device.name}"
             loading="lazy">
      </div>
    </div>
    <div class="card-label">${device.name}</div>
    <div class="card-res">${device.res}</div>
  `;
  grid.appendChild(card);
}

// scenario switching
switcher.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  switcher.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const scenario = btn.dataset.scenario;
  for (const device of devices) {
    document.getElementById(`img-${device.id}`).src =
      `${imgBase}/${device.id}_${scenario}.png`;
  }
});
</script>
</body>
</html>
