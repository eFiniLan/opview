name: Screenshots

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter test test/golden/screenshot_test.dart --update-goldens --tags golden

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: test/golden/goldens/
          retention-days: 30
