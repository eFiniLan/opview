name: APK Size

on:
  pull_request:
    branches: [main]

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: base-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: pr-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  compare:
    needs: [build-base, build-pr]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: base-apk
          path: base

      - uses: actions/download-artifact@v4
        with:
          name: pr-apk
          path: pr

      - name: Comment size diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const base = fs.statSync('base/app-release.apk').size;
            const pr = fs.statSync('pr/app-release.apk').size;
            const diff = pr - base;
            const fmt = (b) => (b / 1024 / 1024).toFixed(2) + ' MB';
            const sign = diff > 0 ? '+' : '';
            const emoji = diff > 500000 ? '⚠️' : diff < -500000 ? '🎉' : '📦';

            const body = [
              `${emoji} **APK Size**`,
              '',
              '| | Size |',
              '|---|---|',
              `| main | ${fmt(base)} |`,
              `| PR | ${fmt(pr)} |`,
              `| diff | ${sign}${fmt(diff)} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('**APK Size**'));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
